name: CI

on:
  push:
    branches: [main]
    # Skip re-trigger from the automated release commit
    paths-ignore:
      - "CHANGELOG.md"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:

  # ── PR validation ────────────────────────────────────────────────────────
  # Single-target build to prove compilation works.  Fast, cheap, every PR.

  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheel (validation only)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --find-interpreter
          sccache: true
          manylinux: manylinux_2_28
          before-script-linux: |
            if command -v dnf &>/dev/null; then dnf install -y clang-devel glibc-devel; \
            elif command -v apt-get &>/dev/null; then apt-get update && apt-get install -y libclang-dev libc6-dev; \
            elif command -v apk &>/dev/null; then apk add --no-cache clang-dev musl-dev; fi
            export CFLAGS="${CFLAGS:-} -std=gnu99"

  # ── Release: determine next version ──────────────────────────────────────
  # Reads the version from Cargo.toml (the single source of truth) and
  # compares it against the latest git tag.  Skips release if already tagged.

  version:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
      tag: ${{ steps.next.outputs.tag }}
      skip: ${{ steps.next.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine version from Cargo.toml
        id: next
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          LATEST_TAG="${LATEST_TAG#v}"

          echo "current=$LATEST_TAG cargo=$VERSION"

          if [ "$VERSION" = "$LATEST_TAG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already tagged — skipping release."
            exit 0
          fi

          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"     >> "$GITHUB_OUTPUT"
          echo "skip=false"        >> "$GITHUB_OUTPUT"
          echo "Next release: v$VERSION"

  # ── Build wheels ─────────────────────────────────────────────────────────
  # Cargo.toml already carries the release version; maturin reads it directly.

  linux:
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04-arm
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: false
          manylinux: manylinux_2_28
          before-script-linux: |
            if command -v dnf &>/dev/null; then dnf install -y clang-devel glibc-devel; \
            elif command -v apt-get &>/dev/null; then apt-get update && apt-get install -y libclang-dev libc6-dev; \
            elif command -v apk &>/dev/null; then apk add --no-cache clang-dev musl-dev; fi
            TARGET_INCLUDE=$(find /usr -name "libc-header-start.h" -path "*/bits/*" 2>/dev/null | head -1 | sed 's|/bits/libc-header-start.h||')
            if [ -n "$TARGET_INCLUDE" ]; then
              export BINDGEN_EXTRA_CLANG_ARGS="-I${TARGET_INCLUDE}"
            fi
            export CFLAGS="${CFLAGS:-} -std=gnu99"
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  sdist:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  # ── Changelog + Tag + Publish ────────────────────────────────────────────
  # Runs after all builds pass.  Generates CHANGELOG.md, commits, tags,
  # pushes, then publishes the already-built wheels to PyPI.

  release:
    needs: [version, linux, sdist]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate changelog
        run: git-cliff --tag ${{ needs.version.outputs.tag }} -o CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): ${{ needs.version.outputs.tag }}"
          git tag "${{ needs.version.outputs.tag }}"
          git push origin main --follow-tags

      - uses: actions/download-artifact@v7

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
