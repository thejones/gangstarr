name: CI

on:
  push:
    branches: [main]
    # Skip re-trigger from the automated release commit
    paths-ignore:
      - "CHANGELOG.md"
      - "Cargo.toml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:

  # ── PR validation ────────────────────────────────────────────────────────
  # Single-target build to prove compilation works.  Fast, cheap, every PR.

  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheel (validation only)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --find-interpreter
          sccache: true
          manylinux: manylinux_2_28
          before-script-linux: |
            if command -v dnf &>/dev/null; then dnf install -y clang-devel glibc-devel; \
            elif command -v apt-get &>/dev/null; then apt-get update && apt-get install -y libclang-dev libc6-dev; \
            elif command -v apk &>/dev/null; then apk add --no-cache clang-dev musl-dev; fi
            export CFLAGS="${CFLAGS:-} -std=gnu99"

  # ── Release: determine next version ──────────────────────────────────────
  # Uses git-cliff --bumped-version to calculate the next semver tag from
  # conventional commits since the latest tag.  Skips if nothing to bump.

  version:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
      tag: ${{ steps.next.outputs.tag }}
      skip: ${{ steps.next.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff
      - name: Determine next version
        id: next
        run: |
          BUMPED=$(git-cliff --bumped-version 2>/dev/null || true)
          BUMPED="${BUMPED#v}"

          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          CURRENT="${CURRENT#v}"

          echo "current=$CURRENT bumped=$BUMPED"

          if [ -z "$BUMPED" ] || [ "$BUMPED" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version bump detected — skipping release."
            exit 0
          fi

          echo "version=$BUMPED"  >> "$GITHUB_OUTPUT"
          echo "tag=v$BUMPED"     >> "$GITHUB_OUTPUT"
          echo "skip=false"       >> "$GITHUB_OUTPUT"
          echo "Next version: v$BUMPED"

  # ── Build wheels ─────────────────────────────────────────────────────────
  # Cargo.toml is patched to the release version before maturin runs so the
  # wheel metadata (and filename) carries the correct version.

  linux:
    needs: [version]
    # if: needs.version.outputs.skip != 'true'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04-arm
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Set release version
        run: sed -i "s/^version = \".*\"/version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: false
          manylinux: manylinux_2_28
          before-script-linux: |
            if command -v dnf &>/dev/null; then dnf install -y clang-devel glibc-devel; \
            elif command -v apt-get &>/dev/null; then apt-get update && apt-get install -y libclang-dev libc6-dev; \
            elif command -v apk &>/dev/null; then apk add --no-cache clang-dev musl-dev; fi
            TARGET_INCLUDE=$(find /usr -name "libc-header-start.h" -path "*/bits/*" 2>/dev/null | head -1 | sed 's|/bits/libc-header-start.h||')
            if [ -n "$TARGET_INCLUDE" ]; then
              export BINDGEN_EXTRA_CLANG_ARGS="-I${TARGET_INCLUDE}"
            fi
            export CFLAGS="${CFLAGS:-} -std=gnu99"
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  sdist:
    needs: [version]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set release version
        run: sed -i "s/^version = \".*\"/version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  # ── Changelog + Tag + Publish ────────────────────────────────────────────
  # Runs after all builds pass.  Updates Cargo.toml + CHANGELOG.md, commits,
  # tags, pushes, then publishes the already-built wheels to PyPI.

  release:
    needs: [version, linux, sdist]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Update Cargo.toml version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml
          echo "Cargo.toml → ${{ needs.version.outputs.version }}"

      - name: Generate changelog
        run: git-cliff --tag ${{ needs.version.outputs.tag }} -o CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml CHANGELOG.md
          git commit -m "chore(release): ${{ needs.version.outputs.tag }}"
          git tag "${{ needs.version.outputs.tag }}"
          git push origin main --follow-tags

      - uses: actions/download-artifact@v7

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
