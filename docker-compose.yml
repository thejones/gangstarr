services:
  db:
    image: postgres:17
    ports:
      - "5433:5432"
    command: postgres -c shared_preload_libraries=pg_stat_statements
    environment:
      POSTGRES_USER: gangstarr
      POSTGRES_PASSWORD: gangstarr
      POSTGRES_DB: gangstarr
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gangstarr"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s

  psql:
    image: postgres:17-alpine
    profiles: [tools]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: gangstarr
    entrypoint: ["psql", "-h", "db", "-U", "gangstarr", "-d", "gangstarr"]

volumes:
  pgdata:
